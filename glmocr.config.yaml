server:
  host: "0.0.0.0"
  port: 8000
  debug: false

logging:
  level: INFO

pipeline:
  maas:
    enabled: false

  ocr_api:
    api_host: 127.0.0.1
    api_port: 8080
    model: glm-ocr
    api_mode: openai
    api_path: /v1/chat/completions
    verify_ssl: false
    connect_timeout: 30
    request_timeout: 600
    retry_max_attempts: 2
    retry_backoff_base_seconds: 0.5
    retry_backoff_max_seconds: 8.0
    retry_jitter_ratio: 0.2
    retry_status_codes: [429, 500, 502, 503, 504]
    connection_pool_size: 128

  max_workers: 16
  page_maxsize: 32
  region_maxsize: 256

  page_loader:
    max_tokens: 8192
    temperature: 0.01
    top_p: 0.9
    top_k: 50
    repetition_penalty: 1.05
    image_format: JPEG
    pdf_dpi: 180
    pdf_max_pages: null
    pdf_verbose: false
    default_prompt: >
      Extract every visible piece of text from this page as faithfully as possible.
      Do not omit titles, subtitles, headers, footers, labels, captions, footnotes,
      notes, side text, or text near or around tables.
      Preserve the document structure and formatting semantics whenever they are
      visually identifiable, including headings, paragraphs, lists, emphasis,
      code blocks, formulas, and table content.
      Respond in Markdown whenever possible. Use HTML only when Markdown cannot
      preserve the layout well enough. Keep text in reading order and do not
      invent content that is not visibly present.

  result_formatter:
    filter_nested: true
    min_overlap_ratio: 0.8
    output_format: both

  enable_layout: true

  layout:
    model_dir: PaddlePaddle/PP-DocLayoutV3_safetensors
    threshold: 0.3
    batch_size: 1
    workers: 1
    cuda_visible_devices: "0"
    layout_nms: true
